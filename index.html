<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ciel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Playfair+Display:ital,wght@1,400&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="loading">

  <!-- オープニング -->
  <div id="opening">
    <div class="opening-bg"></div>
    <div class="opening-frame">
      <div class="opening-line-top"></div>
      <div class="opening-content">
        <img src="symbol.png" class="opening-logo-svg" alt="Ciel">
        <div class="opening-sub">株式会社シエル</div>
      </div>
      <div class="opening-line-bottom"></div>
    </div>
  </div>

  <!-- 斜線 -->
  <svg class="the-line" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%"   stop-color="#c4a55c" stop-opacity="0"/>
        <stop offset="10%"  stop-color="#c4a55c" stop-opacity="0.6"/>
        <stop offset="90%"  stop-color="#c4a55c" stop-opacity="0.6"/>
        <stop offset="100%" stop-color="#c4a55c" stop-opacity="0"/>
      </linearGradient>
    </defs>
    <line x1="0" y1="44%" x2="100%" y2="63%" stroke="url(#lg)" stroke-width="0.8"/>
  </svg>

  <!-- ヘッダー -->
  <header>
    <div class="container header-inner">
      <div class="logo-lockup">
        <img src="symbol.png" class="logo-symbol" alt="" aria-hidden="true">
        <span class="logo-wordmark">Ciel</span>
      </div>
      <nav>
        <a href="apps.html">App</a>
        <a href="insole.html">Insole</a>
        <a href="#contact">Contact</a>
      </nav>
    </div>
  </header>

  <!-- 事業一覧 -->
  <section class="divisions-index">
    <div class="container">
      <a href="apps.html" class="division-link fade-up">
        <span class="division-link-num">01</span>
        <span class="division-link-name">アプリ開発部</span>
        <span class="division-link-arrow">→</span>
      </a>
      <a href="insole.html" class="division-link fade-up">
        <span class="division-link-num">02</span>
        <span class="division-link-name">インソール事業部</span>
        <span class="division-link-arrow">→</span>
      </a>
    </div>
  </section>

  <!-- コンタクト -->
  <section id="contact" class="contact-section">
    <div class="container fade-up">
      <a href="mailto:hello@ciel.co.jp" class="contact-email">hello@ciel.co.jp</a>
    </div>
  </section>

  <!-- フッター -->
  <footer>
    <div class="container">
      <p>&copy; 2025 Ciel</p>
    </div>
  </footer>

  <script>
    window.addEventListener('load', () => {
      const opening = document.getElementById('opening');
      setTimeout(() => {
        opening.classList.add('hide');
        document.body.classList.remove('loading');
      }, 3300);
    });

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) entry.target.classList.add('visible');
      });
    }, { threshold: 0.15 });

    document.querySelectorAll('.fade-up').forEach(el => observer.observe(el));
  </script>

</body>
</html>
